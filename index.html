<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Biological Dynamics Core Demo</title>
    <style>
        :root {
            color-scheme: dark;
        }

        body {
            margin: 0;
            padding: 0;
            background-color: #071017;
            overflow: hidden;
        }

        canvas {
            display: block;
        }

        #floating-add-node {
            position: fixed;
            bottom: 24px;
            right: 24px;
            z-index: 1000;
            background: rgba(54, 214, 255, 0.15);
            border: 1px solid rgba(54, 214, 255, 0.4);
            color: #36d6ff;
            padding: 10px 18px;
            border-radius: 999px;
            font-family: 'Segoe UI', system-ui, sans-serif;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            backdrop-filter: blur(8px);
            transition: all 0.2s;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.3);
            display: flex;
            align-items: center;
            gap: 8px;
        }

        #floating-add-node:hover {
            background: rgba(54, 214, 255, 0.25);
            transform: translateY(-2px);
            box-shadow: 0 8px 30px rgba(54, 214, 255, 0.2);
        }

        #floating-add-node:active {
            transform: scale(0.95);
        }
    </style>
    <!-- Load Phaser 3 -->
    <script src="https://cdn.jsdelivr.net/npm/phaser@3.80.1/dist/phaser.min.js"></script>
</head>

<body>
    <button id="floating-add-node">
        <span>➕</span>
        <span>新增节点 (E)</span>
    </button>
    <script>
        document.getElementById('floating-add-node').addEventListener('mousedown', (e) => {
            e.preventDefault();
            if (window.activeScene) {
                window.activeScene.addDebugNode();
            }
        });
    </script>
    <script src="tuning-panel.js"></script>
    <script src="src/constants.js"></script>
    <script src="src/utils.js"></script>
    <script src="src/storage.js"></script>
    <script src="src/ui.js"></script>
    <script src="src/scene.js"></script>
    <script src="src/sceneInit.js"></script>
    <script src="src/sceneSaveLoad.js"></script>
    <script src="src/sceneTopology.js"></script>
    <script src="src/sceneInput.js"></script>
    <script src="src/sceneMovement.js"></script>
    <script src="src/sceneCombat.js"></script>
    <script src="src/sceneEnemies.js"></script>
    <script src="src/sceneRender.js"></script>
    <script src="src/main.js"></script>

</body>
</html>
