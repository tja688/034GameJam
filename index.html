    <meta charset="UTF-8">

    <title>Biological Dynamics Core Demo</title>
    <style>
        :root {
            color-scheme: dark;
        }

        body {
            margin: 0;
            padding: 0;
            background-color: #071017;
            overflow: hidden;
        }

        canvas {
            display: block;
        }

        #floating-add-node {
            position: fixed;
            bottom: 24px;
            right: 24px;
            z-index: 1000;
            background: rgba(54, 214, 255, 0.15);
            border: 1px solid rgba(54, 214, 255, 0.4);
            color: #36d6ff;
            padding: 10px 18px;
            border-radius: 999px;
            font-family: 'Segoe UI', system-ui, sans-serif;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            backdrop-filter: blur(8px);
            transition: all 0.2s;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.3);
            display: flex;
            align-items: center;
            gap: 8px;
            display: none;
        }

        #floating-add-node:hover {
            background: rgba(54, 214, 255, 0.25);
            transform: translateY(-2px);
            box-shadow: 0 8px 30px rgba(54, 214, 255, 0.2);
        }

        #floating-add-node:active {
            transform: scale(0.95);
        }
    </style>
    <!-- Load Phaser 3 (local copy to avoid CDN/network instability) -->
    <script src="vendor/phaser.min.js"></script>
</head>

<body>
    <button id="floating-add-node" aria-hidden="true"></button>
    <script>
        window.CORE_DEMO_DEBUG = true;
    </script>
    <script>
        const debugButton = document.getElementById('floating-add-node');
        const devToolsEnabled = window.CORE_DEMO_DEBUG !== false;
        debugButton.textContent = '➕ 节点';
        debugButton.setAttribute('aria-hidden', String(!devToolsEnabled));
        if (devToolsEnabled) {
            debugButton.style.display = 'flex';
        }
        debugButton.addEventListener('mousedown', (e) => {
            e.preventDefault();
            if (devToolsEnabled && window.activeScene) {
                window.activeScene.addDebugNode();
            }
        });
    </script>
